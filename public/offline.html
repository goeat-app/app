<!doctype html>
<html lang="pt-BR">

<head>

  <meta name="theme-color" content="#FDF6F5" />
  <title>GoEat offline</title>
  <style>
    :root {
      color-scheme: light;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #fdf6f5;
      color: #00141c;
      padding: 24px;
    }

    main {
      max-width: 460px;
      width: 100%;
      background: #fff;
      border: 1px solid #f2d5cd;
      border-radius: 20px;
      padding: 24px;
      text-align: center;
      box-shadow: 0 10px 32px rgba(0, 20, 28, 0.08);
    }

    h1 {
      margin: 0 0 12px;
      font-size: 1.25rem;
      color: #ff6b35;
    }

    p {
      margin: 0;
      line-height: 1.45;

<body>

    <h1>Sem conexao no momento</h1>

</html>
